<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 4 Kiwi English Adventure!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #87CEEB; /* Sky blue */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #FF6B6B;
            margin-top: 0;
            font-size: 2.5rem;
        }

        #score-board {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4ECDC4;
            margin-bottom: 20px;
        }

        #question-box {
            font-size: 1.5rem;
            color: #2F3542;
            margin-bottom: 30px;
            min-height: 60px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background-color: #F8EFBA;
            border: 3px solid #F5CD79;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
            color: #2F3542;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #F5CD79;
            transform: scale(1.05);
        }

        #feedback {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 35px;
        }

        .correct { color: #2ED573; }
        .wrong { color: #FF4757; }

        #restart-btn {
            display: none;
            margin-top: 20px;
            background-color: #FF6B6B;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
        }

        #restart-btn:hover {
            background-color: #FF4757;
        }
        
        .skill-tag {
            font-size: 0.9rem;
            color: #a4b0be;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Kiwi English Adventure!</h1>
        <div id="score-board">Score: <span id="score">0</span></div>
        
        <div id="game-area">
            <span class="skill-tag" id="skill-tag">Skill: Loading...</span>
            <div id="question-box">Loading question...</div>
            <div class="btn-grid" id="options">
                <!-- Buttons will be generated by JavaScript -->
            </div>
            <div id="feedback"></div>
        </div>

        <button id="restart-btn" onclick="startGame()">Play Again!</button>
    </div>

    <script>
        // Questions based on Year 4 English Syllabus
        const questions = [
            {
                question: "Choose the correct article: I am eating ___ apple.",
                options: ["a", "an", "the", "two"],
                answer: "an",
                skill: "QQ.1 Articles (a or an)"
            },
            {
                question: "What type of sentence is this: 'What time does the movie start?'",
                options: ["Statement", "Command", "Question", "Exclamation"],
                answer: "Question",
                skill: "KK.1 Sentences, fragments and run-ons"
            },
            {
                question: "Which word is a synonym (means the same) for 'Happy'?",
                options: ["Sad", "Angry", "Joyful", "Tired"],
                answer: "Joyful",
                skill: "DD.1 Synonyms and antonyms"
            },
            {
                question: "What is the plural of 'mouse'?",
                options: ["Mouses", "Mice", "Meese", "Mouse"],
                answer: "Mice",
                skill: "LL.8 Irregular plurals"
            },
            {
                question: "What does the prefix 're-' mean in the word 'rewrite'?",
                options: ["Do before", "Do again", "Not", "Too much"],
                answer: "Do again",
                skill: "Z.2 Prefixes and suffixes"
            },
            {
                question: "Which of these words is a homophone for 'two'?",
                options: ["Toe", "To", "Tow", "Top"],
                answer: "To",
                skill: "EE.2 Homophones"
            },
            {
                question: "Which word is a noun in this sentence: 'The green frog jumped.'?",
                options: ["The", "green", "frog", "jumped"],
                answer: "frog",
                skill: "LL.2 Identify Nouns"
            },
            {
                question: "Which day is capitalised correctly?",
                options: ["monday", "mOnday", "Monday", "monDay"],
                answer: "Monday",
                skill: "WW.2 Capitalisation"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const questionBox = document.getElementById("question-box");
        const optionsBox = document.getElementById("options");
        const feedbackBox = document.getElementById("feedback");
        const scoreBox = document.getElementById("score");
        const restartBtn = document.getElementById("restart-btn");
        const gameArea = document.getElementById("game-area");
        const skillTag = document.getElementById("skill-tag");

        function startGame() {
            currentQuestionIndex = 0;
            score = 0;
            scoreBox.innerText = score;
            restartBtn.style.display = "none";
            gameArea.style.display = "block";
            feedbackBox.innerText = "";
            showQuestion();
        }

        function showQuestion() {
            feedbackBox.innerText = "";
            
            // End of game
            if (currentQuestionIndex >= questions.length) {
                questionBox.innerHTML = "🎉 Awesome job! You finished the adventure! 🎉";
                optionsBox.innerHTML = "";
                skillTag.innerText = "";
                restartBtn.style.display = "inline-block";
                return;
            }

            const currentQuestion = questions[currentQuestionIndex];
            questionBox.innerText = currentQuestion.question;
            skillTag.innerText = "Practising: " + currentQuestion.skill;
            
            optionsBox.innerHTML = "";
            
            currentQuestion.options.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.classList.add("btn");
                button.onclick = () => selectAnswer(option, currentQuestion.answer);
                optionsBox.appendChild(button);
            });
        }

        function selectAnswer(selected, correct) {
            if (selected === correct) {
                feedbackBox.innerText = "🌟 Correct! Great job!";
                feedbackBox.className = "correct";
                score += 10;
                scoreBox.innerText = score;
            } else {
                feedbackBox.innerText = "Oops! The correct answer was: " + correct;
                feedbackBox.className = "wrong";
            }

            // Wait 2 seconds before showing the next question
            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
            }, 2000);
        }

        // Start the game when the page loads
        startGame();
    </script>
</body>
</html>
