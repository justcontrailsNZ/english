<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi English Adventure!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&family=Poppins:wght@600&display=swap');

        :root {
            --bg-color: #87CEEB; 
            --bg-gradient: linear-gradient(135deg, #87CEEB, #f5f6fa);
            --container-bg: white;
            --text-color: #2F3542;
            --title-color: #FF6B6B;
            --btn-bg: #F8EFBA;
            --btn-border: #F5CD79;
            --btn-hover: #F5CD79;
            --progress-bg: #2ED573;
            --skill-bg: #dfe4ea;
        }

        body.clariza-theme {
            --bg-color: #ff9a9e;
            --bg-gradient: linear-gradient(120deg, #fbc2eb 0%, #a6c1ee 100%);
            --container-bg: #ffffff;
            --title-color: #d11a2a;
            --btn-bg: #fff0f5;
            --btn-border: #ffb6c1;
            --btn-hover: #ffd1dc;
            --progress-bg: #ff69b4;
            --skill-bg: #ffe4e1;
        }

        body.jace-theme {
            --bg-color: #0f2027;
            --bg-gradient: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            --container-bg: #f1f2f6;
            --text-color: #1e272e;
            --title-color: #ff7f50;
            --btn-bg: #dff9fb;
            --btn-border: #7ed6df;
            --btn-hover: #c7ecee;
            --progress-bg: #f0932b;
            --skill-bg: #c8d6e5;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.5s ease;
        }

        #game-container {
            background-color: var(--container-bg);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            padding: 30px;
            width: 90%;
            max-width: 750px;
            text-align: center;
            margin: 20px;
            transition: all 0.5s ease;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--title-color); margin-top: 0; font-size: 2.2rem; }
        
        #setup-menu { display: block; }

        .character-select-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .char-card { background-color: white; border: 4px solid #dfe4ea; border-radius: 20px; padding: 15px; width: 45%; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .char-card:hover { transform: translateY(-5px); }
        .char-card.selected-clariza { border-color: #ff69b4; background-color: #fff0f5; }
        .char-card.selected-jace { border-color: #f0932b; background-color: #fceaea; }
        .char-icon { font-size: 3rem; margin-bottom: 5px; }
        .char-name { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: #2f3542; margin: 0; }
        .char-year { font-weight: bold; color: #747d8c; margin: 5px 0; }
        .char-likes { font-size: 0.9rem; color: #57606f; }

        .menu-section { margin-bottom: 25px; background-color: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 15px; }
        select { font-size: 1.2rem; font-family: 'Nunito', sans-serif; padding: 10px; border-radius: 10px; border: 2px solid #a4b0be; width: 80%; max-width: 300px; font-weight: bold; }
        
        #start-btn, #restart-btn { background-color: #2ED573; color: white; border: none; border-radius: 15px; padding: 15px 40px; font-size: 1.5rem; cursor: pointer; font-weight: bold; font-family: 'Fredoka One', cursive; margin-top: 10px; box-shadow: 0 5px 0 #219a52; }
        #start-btn:hover, #restart-btn:hover { transform: translateY(3px); box-shadow: 0 2px 0 #219a52; }
        #restart-btn { display: none; background-color: #FF6B6B; box-shadow: 0 5px 0 #c0392b; }

        #game-play-area { display: none; }
        .stats-bar { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; color: var(--text-color); margin-bottom: 15px; }
        #progress-container { width: 100%; background-color: #dfe4ea; border-radius: 10px; height: 15px; margin-bottom: 25px; overflow: hidden; }
        #progress-bar { height: 100%; background-color: var(--progress-bg); width: 0%; transition: width 0.4s ease; }

        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .skill-tag { font-size: 0.85rem; background-color: var(--skill-bg); color: var(--text-color); padding: 5px 15px; border-radius: 15px; font-weight: bold; }
        #audio-btn { background-color: #f1c40f; border: none; border-radius: 10px; padding: 8px 15px; font-size: 1rem; font-family: 'Poppins', sans-serif; font-weight: bold; color: #2c3e50; cursor: pointer; box-shadow: 0 3px 0 #f39c12; }
        #audio-btn:active { transform: translateY(3px); box-shadow: none; }

        #question-box { font-size: 1.6rem; color: var(--text-color); margin-bottom: 25px; min-height: 70px; font-weight: 700; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background-color: var(--btn-bg); border: 3px solid var(--btn-border); border-radius: 15px; padding: 15px; font-size: 1.2rem; font-family: 'Nunito', sans-serif; font-weight: bold; color: var(--text-color); cursor: pointer; transition: all 0.2s ease; }
        .btn:hover { background-color: var(--btn-hover); transform: scale(1.03); }

        #feedback { margin-top: 20px; font-size: 1.4rem; font-weight: bold; min-height: 35px; }
        .correct { color: #2ED573; }
        .wrong { color: #FF4757; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="game-title">✨ Kiwi English Adventure! ✨</h1>

        <!-- Setup Menu -->
        <div id="setup-menu">
            <div class="menu-section">
                <h3>Choose Your Character</h3>
                <div class="character-select-container">
                    <div class="char-card selected-clariza" id="card-clariza" onclick="selectCharacter('clariza')">
                        <div class="char-icon">🦄</div>
                        <h4 class="char-name">Clariza</h4>
                        <p class="char-year">Year 2 English</p>
                        <div class="char-likes">🌈 Rainbows & Cupcakes 🧁</div>
                    </div>
                    <div class="char-card" id="card-jace" onclick="selectCharacter('jace')">
                        <div class="char-icon">🦖</div>
                        <h4 class="char-name">Jace</h4>
                        <p class="char-year">Year 4 English</p>
                        <div class="char-likes">🏎️ Hotwheels, Planets 🪐</div>
                    </div>
                </div>
            </div>
            <div class="menu-section">
                <h3>How many questions?</h3>
                <select id="length-select">
                    <option value="10">10 Questions (Quick Play)</option>
                    <option value="20">20 Questions (Standard Play)</option>
                    <option value="all">All Topics (Challenge!)</option>
                </select>
            </div>
            <button id="start-btn" onclick="initializeGame()">Start Game!</button>
        </div>
        
        <!-- Game Play Area -->
        <div id="game-play-area">
            <div class="stats-bar">
                <span id="question-counter">Question: 1 / 10</span>
                <span>Score: <span id="score">0</span></span>
            </div>
            <div id="progress-container"><div id="progress-bar"></div></div>
            
            <div class="question-header">
                <div class="skill-tag" id="skill-tag">Skill: Loading...</div>
                <button id="audio-btn" onclick="playQuestionAudio()">🔊 Read to me!</button>
            </div>
            
            <div id="question-box">Loading question...</div>
            <div class="btn-grid" id="options"></div>
            <div id="feedback"></div>
        </div>
        <button id="restart-btn" onclick="backToMenu()">Back to Menu</button>
    </div>

        // Convert raw arrays into usable objects
        const year2Questions = rawY2.map(q => ({ skill: q[0], question: q[1], options: q[2], answer: q[3] }));
        const year4Questions = rawY4.map(q => ({ skill: q[0], question: q[1], options: q[2], answer: q[3] }));

        // GAME LOGIC VARIABLES
        let currentCharacter = 'clariza'; 
        let currentQuestionList = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswering = false;

        const setupMenu = document.getElementById("setup-menu");
        const gamePlayArea = document.getElementById("game-play-area");
        const questionBox = document.getElementById("question-box");
        const optionsBox = document.getElementById("options");
        const feedbackBox = document.getElementById("feedback");
        const scoreBox = document.getElementById("score");
        const restartBtn = document.getElementById("restart-btn");
        const skillTag = document.getElementById("skill-tag");
        const questionCounter = document.getElementById("question-counter");
        const progressBar = document.getElementById("progress-bar");
        const gameTitle = document.getElementById("game-title");

        selectCharacter('clariza'); 

        function selectCharacter(char) {
            currentCharacter = char;
            document.getElementById('card-clariza').classList.remove('selected-clariza');
            document.getElementById('card-jace').classList.remove('selected-jace');
            
            if(char === 'clariza') {
                document.getElementById('card-clariza').classList.add('selected-clariza');
                document.body.className = 'clariza-theme';
                gameTitle.innerText = "🦄 Clariza's English Adventure! 🧁";
            } else {
                document.getElementById('card-jace').classList.add('selected-jace');
                document.body.className = 'jace-theme';
                gameTitle.innerText = "🦖 Jace's English Adventure! 🪐";
            }
        }

        function shuffle(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initializeGame() {
            if('speechSynthesis' in window) window.speechSynthesis.cancel();
            const lengthSelection = document.getElementById("length-select").value;
            let database = (currentCharacter === 'clariza') ? year2Questions : year4Questions;

            // --- SMART SHUFFLE SYSTEM ---
            let groupedSkills = {};
            database.forEach(q => {
                if(!groupedSkills[q.skill]) groupedSkills[q.skill] = [];
                groupedSkills[q.skill].push(q);
            });

            // Play ALL mode vs Standard length mode
            if (lengthSelection === "all") {
                currentQuestionList = shuffle(database); // Just shuffle all 100 questions
            } else {
                // If 10 or 20 questions, grab unique topics to prevent repeats!
                let uniqueTopicQuestions = [];
                let loopCount = (parseInt(lengthSelection) === 20) ? 2 : 1; 

                for(let i=0; i < loopCount; i++) {
                    for(let skill in groupedSkills) {
                        let questionsInBucket = groupedSkills[skill];
                        let randomQuestion = questionsInBucket[Math.floor(Math.random() * questionsInBucket.length)];
                        // Make sure we don't pick the exact same question twice
                        if(!uniqueTopicQuestions.includes(randomQuestion)) {
                            uniqueTopicQuestions.push(randomQuestion);
                        }
                    }
                }
                currentQuestionList = shuffle(uniqueTopicQuestions).slice(0, parseInt(lengthSelection));
            }

            currentQuestionIndex = 0;
            score = 0;
            scoreBox.innerText = score;
            setupMenu.style.display = "none";
            restartBtn.style.display = "none";
            gamePlayArea.style.display = "block";
            skillTag.style.display = "inline-block";
            showQuestion();
        }

        function showQuestion() {
            isAnswering = false;
            feedbackBox.innerText = "";
            if('speechSynthesis' in window) window.speechSynthesis.cancel(); 
            
            if (currentQuestionIndex >= currentQuestionList.length) {
                questionBox.innerHTML = `🎉 Amazing! You finished your adventure with a score of ${score}! 🎉`;
                optionsBox.innerHTML = "";
                skillTag.style.display = "none";
                document.getElementById('audio-btn').style.display = "none";
                questionCounter.innerText = "Complete!";
                progressBar.style.width = "100%";
                restartBtn.style.display = "inline-block";
                return;
            }

            const currentQuestion = currentQuestionList[currentQuestionIndex];
            
            document.getElementById('audio-btn').style.display = "inline-block";
            questionCounter.innerText = `Question: ${currentQuestionIndex + 1} / ${currentQuestionList.length}`;
            let progressPercentage = (currentQuestionIndex / currentQuestionList.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;
            
            skillTag.innerText = "Topic: " + currentQuestion.skill;
            questionBox.innerText = currentQuestion.question;
            optionsBox.innerHTML = "";
            
            let shuffledOptions = shuffle(currentQuestion.options);
            shuffledOptions.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.classList.add("btn");
                button.onclick = () => selectAnswer(option, currentQuestion.answer, button);
                optionsBox.appendChild(button);
            });
        }

        function playQuestionAudio() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(questionBox.innerText);
                utterance.rate = 0.9; 
                utterance.pitch = 1.1; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Sorry, your browser does not support the Read Aloud feature.");
            }
        }

        function selectAnswer(selected, correct, buttonElement) {
            if (isAnswering) return; 
            isAnswering = true;
            const buttons = document.querySelectorAll('.btn');
            
            if (selected === correct) {
                feedbackBox.innerText = "🌟 Correct! Great job!";
                feedbackBox.className = "correct";
                buttonElement.style.backgroundColor = "#2ED573"; 
                buttonElement.style.color = "white";
                buttonElement.style.borderColor = "#219a52";
                score += 10;
                scoreBox.innerText = score;
            } else {
                feedbackBox.innerText = "Oops! The correct answer was: " + correct;
                feedbackBox.className = "wrong";
                buttonElement.style.backgroundColor = "#FF4757"; 
                buttonElement.style.color = "white";
                buttonElement.style.borderColor = "#c0392b";
                
                buttons.forEach(btn => {
                    if(btn.innerText === correct) {
                        btn.style.backgroundColor = "#2ED573";
                        btn.style.color = "white";
                        btn.style.borderColor = "#219a52";
                    }
                });
            }

            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
            }, 2000);
        }

        function backToMenu() {
            if('speechSynthesis' in window) window.speechSynthesis.cancel();
            gamePlayArea.style.display = "none";
            restartBtn.style.display = "none";
            setupMenu.style.display = "block";
            selectCharacter(currentCharacter); 
        }
