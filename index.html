<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi English Adventure!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&family=Poppins:wght@600&display=swap');

        /* --- DYNAMIC THEME VARIABLES --- */
        :root {
            --bg-color: #87CEEB; /* Sky blue default */
            --bg-gradient: linear-gradient(135deg, #87CEEB, #f5f6fa);
            --container-bg: white;
            --text-color: #2F3542;
            --title-color: #FF6B6B;
            --btn-bg: #F8EFBA;
            --btn-border: #F5CD79;
            --btn-hover: #F5CD79;
            --progress-bg: #2ED573;
            --skill-bg: #dfe4ea;
        }

        /* CLARIZA'S THEME (Unicorns, Rainbows, Cupcakes) */
        body.clariza-theme {
            --bg-color: #ff9a9e;
            --bg-gradient: linear-gradient(120deg, #fbc2eb 0%, #a6c1ee 100%);
            --container-bg: #ffffff;
            --title-color: #d11a2a;
            --btn-bg: #fff0f5;
            --btn-border: #ffb6c1;
            --btn-hover: #ffd1dc;
            --progress-bg: #ff69b4;
            --skill-bg: #ffe4e1;
        }

        /* JACE'S THEME (Dinos, Hotwheels, Planets, Fishing, Animals) */
        body.jace-theme {
            --bg-color: #0f2027;
            --bg-gradient: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            --container-bg: #f1f2f6;
            --text-color: #1e272e;
            --title-color: #ff7f50;
            --btn-bg: #dff9fb;
            --btn-border: #7ed6df;
            --btn-hover: #c7ecee;
            --progress-bg: #f0932b;
            --skill-bg: #c8d6e5;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.5s ease;
        }

        #game-container {
            background-color: var(--container-bg);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            padding: 30px;
            width: 90%;
            max-width: 750px;
            text-align: center;
            margin: 20px;
            transition: all 0.5s ease;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--title-color);
            margin-top: 0;
            font-size: 2.2rem;
            transition: color 0.5s ease;
        }

        /* --- CHARACTER SELECTION UI --- */
        #setup-menu { display: block; }

        .character-select-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .char-card {
            background-color: white;
            border: 4px solid #dfe4ea;
            border-radius: 20px;
            padding: 15px;
            width: 45%;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .char-card:hover { transform: translateY(-5px); }

        .char-card.selected-clariza {
            border-color: #ff69b4;
            background-color: #fff0f5;
        }

        .char-card.selected-jace {
            border-color: #f0932b;
            background-color: #fceaea;
        }

        .char-icon { font-size: 3rem; margin-bottom: 5px; }
        .char-name { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: #2f3542; margin: 0; }
        .char-year { font-weight: bold; color: #747d8c; margin: 5px 0; }
        .char-likes { font-size: 0.9rem; color: #57606f; }

        .menu-section {
            margin-bottom: 25px;
            background-color: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 15px;
        }

        select {
            font-size: 1.2rem;
            font-family: 'Nunito', sans-serif;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #a4b0be;
            width: 80%;
            max-width: 300px;
            font-weight: bold;
            color: #2f3542;
        }

        #start-btn, #restart-btn {
            background-color: #2ED573;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Fredoka One', cursive;
            transition: transform 0.2s;
            margin-top: 10px;
            box-shadow: 0 5px 0 #219a52;
        }

        #start-btn:hover, #restart-btn:hover {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #219a52;
        }

        #restart-btn { display: none; background-color: #FF6B6B; box-shadow: 0 5px 0 #c0392b; }
        #restart-btn:hover { box-shadow: 0 2px 0 #c0392b; }

        /* --- GAMEPLAY STYLES --- */
        #game-play-area { display: none; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        #progress-container {
            width: 100%;
            background-color: #dfe4ea;
            border-radius: 10px;
            height: 15px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background-color: var(--progress-bg);
            width: 0%;
            transition: width 0.4s ease, background-color 0.5s ease;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .skill-tag {
            font-size: 0.85rem;
            background-color: var(--skill-bg);
            color: var(--text-color);
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: bold;
            display: inline-block;
        }

        #audio-btn {
            background-color: #f1c40f;
            border: none;
            border-radius: 10px;
            padding: 8px 15px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 3px 0 #f39c12;
            transition: transform 0.1s;
        }

        #audio-btn:active { transform: translateY(3px); box-shadow: none; }

        #question-box {
            font-size: 1.6rem;
            color: var(--text-color);
            margin-bottom: 25px;
            min-height: 70px;
            font-weight: 700;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background-color: var(--btn-bg);
            border: 3px solid var(--btn-border);
            border-radius: 15px;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover { background-color: var(--btn-hover); transform: scale(1.03); }

        #feedback {
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 35px;
        }

        .correct { color: #2ED573; }
        .wrong { color: #FF4757; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="game-title">✨ Kiwi English Adventure! ✨</h1>

        <!-- Setup Menu -->
        <div id="setup-menu">
            
            <div class="menu-section">
                <h3>Choose Your Character</h3>
                <div class="character-select-container">
                    <!-- Clariza Card -->
                    <div class="char-card selected-clariza" id="card-clariza" onclick="selectCharacter('clariza')">
                        <div class="char-icon">🦄</div>
                        <h4 class="char-name">Clariza</h4>
                        <p class="char-year">Year 2 English</p>
                        <div class="char-likes">🌈 Rainbows & Cupcakes 🧁</div>
                    </div>
                    
                    <!-- Jace Card -->
                    <div class="char-card" id="card-jace" onclick="selectCharacter('jace')">
                        <div class="char-icon">🦖</div>
                        <h4 class="char-name">Jace</h4>
                        <p class="char-year">Year 4 English</p>
                        <div class="char-likes">🏎️ Hotwheels, Planets 🪐 & Animals 🐕</div>
                    </div>
                </div>
            </div>
            
            <div class="menu-section">
                <h3>How many questions?</h3>
                <select id="length-select">
                    <option value="10">10 Questions (Quick Play)</option>
                    <option value="20">20 Questions (Standard Play)</option>
                    <option value="all">All Topics (Challenge!)</option>
                </select>
            </div>

            <button id="start-btn" onclick="initializeGame()">Start Game!</button>
        </div>
        
        <!-- Game Play Area -->
        <div id="game-play-area">
            <div class="stats-bar">
                <span id="question-counter">Question: 1 / 10</span>
                <span>Score: <span id="score">0</span></span>
            </div>

            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            
            <div class="question-header">
                <div class="skill-tag" id="skill-tag">Skill: Loading...</div>
                <button id="audio-btn" onclick="playQuestionAudio()">🔊 Read to me!</button>
            </div>
            
            <div id="question-box">Loading question...</div>
            <div class="btn-grid" id="options"></div>
            <div id="feedback"></div>
        </div>

        <button id="restart-btn" onclick="backToMenu()">Back to Menu</button>
    </div>

    <script>
        // --- QUESTION DATABASES ---

        // YEAR 2 QUESTIONS (Clariza)
        const year2Questions = [
            { skill: "A. Consonants & vowels", question: "Which letter is a vowel?", options: ["a", "b", "c", "d"], answer: "a" },
            { skill: "B. Syllables", question: "How many syllables are in the word 'elephant'?", options: ["1", "2", "3", "4"], answer: "3" },
            { skill: "C. Rhyming", question: "Which word rhymes with 'cat'?", options: ["Bat", "Dog", "Sun", "Car"], answer: "Bat" },
            { skill: "D. Blending & segmenting", question: "What word do these sounds make: s-u-n?", options: ["Sun", "Sit", "Sam", "Sad"], answer: "Sun" },
            { skill: "E. Consonant sounds", question: "Which word starts with the same sound as 'Dog'?", options: ["Duck", "Cat", "Pig", "Bird"], answer: "Duck" },
            { skill: "F. Consonant blends/digraphs", question: "Complete the word: __ip (a large boat).", options: ["Sh", "Ch", "Th", "Wh"], answer: "Sh" },
            { skill: "G. Short a", question: "Which word has a short 'a' sound?", options: ["Apple", "Cake", "Rain", "Day"], answer: "Apple" },
            { skill: "H. Short e", question: "Which word has a short 'e' sound?", options: ["Bed", "Tree", "Bee", "Me"], answer: "Bed" },
            { skill: "I. Short i", question: "Which word has a short 'i' sound?", options: ["Pig", "Bike", "Kite", "Ice"], answer: "Pig" },
            { skill: "J. Short o", question: "Which word has a short 'o' sound?", options: ["Dog", "Boat", "Snow", "Toe"], answer: "Dog" },
            { skill: "K. Short u", question: "Which word has a short 'u' sound?", options: ["Sun", "Blue", "Glue", "Flute"], answer: "Sun" },
            { skill: "L. Short vowels", question: "Identify the short vowel in the word 'cat'.", options: ["a", "e", "i", "o"], answer: "a" },
            { skill: "M. Short & long sounds", question: "Which two words have the same vowel sound?", options: ["Cat & Bat", "Dog & Dig", "Sun & Son", "Pen & Pin"], answer: "Cat & Bat" },
            { skill: "N. Silent e", question: "What does the silent 'e' do in 'kite'?", options: ["Makes the 'i' say its name", "Makes the 'k' silent", "Makes the 't' loud", "Nothing"], answer: "Makes the 'i' say its name" },
            { skill: "O. Vowel digraphs", question: "Complete the word: b__t (a thing that floats).", options: ["oa", "ee", "ai", "ue"], answer: "oa" },
            { skill: "P. Short & long patterns", question: "Which word has a LONG vowel?", options: ["Cake", "Cat", "Dog", "Pig"], answer: "Cake" },
            { skill: "Q. Diphthongs", question: "Choose the word with an 'ou' sound.", options: ["House", "Boat", "Tree", "Play"], answer: "House" },
            { skill: "R. Two-syllable words", question: "Put syllables together: but + ter = ?", options: ["butter", "batter", "better", "bitter"], answer: "butter" },
            { skill: "S. Sight words", question: "Which is a correctly spelled sight word?", options: ["They", "Thay", "Thei", "Thae"], answer: "They" },
            { skill: "T. Reality vs fiction", question: "Which could happen in real life?", options: ["A dog barking", "A dog flying", "A dog talking", "A dog driving"], answer: "A dog barking" },
            { skill: "U. Main idea", question: "A story is about a boy finding a lost kiwi bird. What is it about?", options: ["Helping a kiwi", "Eating lunch", "Riding a bike", "Going to school"], answer: "Helping a kiwi" },
            { skill: "V. Inference", question: "A girl is crying holding a broken toy. How does she feel?", options: ["Sad", "Happy", "Angry", "Scared"], answer: "Sad" },
            { skill: "W. Nouns & adjectives", question: "Complete the sentence: The ___ apple.", options: ["red", "jump", "quickly", "very"], answer: "red" },
            { skill: "X. Categories", question: "Which word does NOT belong in the group?", options: ["Apple", "Car", "Bus", "Train"], answer: "Apple" },
            { skill: "Y. Synonyms & antonyms", question: "What is the antonym (opposite) of 'hot'?", options: ["Cold", "Warm", "Sun", "Fire"], answer: "Cold" },
            { skill: "Z. Multiple-meaning words", question: "Which word can be a flying animal AND a cricket tool?", options: ["Bat", "Dog", "Cat", "Ball"], answer: "Bat" },
            { skill: "AA. Shades of meaning", question: "Which word means 'very small'?", options: ["Tiny", "Big", "Huge", "Giant"], answer: "Tiny" },
            { skill: "BB. Prefixes & suffixes", question: "What does 'un-' mean in 'unhappy'?", options: ["Not", "Very", "Again", "Before"], answer: "Not" },
            { skill: "CC. Context clues", question: "'The giant tree reached the clouds.' What does giant mean?", options: ["Very big", "Tiny", "Green", "Old"], answer: "Very big" },
            { skill: "DD. Reference skills", question: "Which word comes first in Alphabetical order?", options: ["Apple", "Banana", "Cat", "Dog"], answer: "Apple" },
            { skill: "EE. Sentences", question: "Which is a question?", options: ["How are you?", "I am fine.", "Stop that!", "The cat is big."], answer: "How are you?" },
            { skill: "FF. Nouns", question: "Which word is a noun (person, place, or thing)?", options: ["Dog", "Run", "Quickly", "Happy"], answer: "Dog" },
            { skill: "GG. Pronouns", question: "Which word can replace 'Sarah' in a sentence?", options: ["She", "He", "It", "They"], answer: "She" },
            { skill: "HH. Verbs", question: "Which word is an action verb?", options: ["Jump", "Red", "Happy", "Fast"], answer: "Jump" },
            { skill: "II. Subject-verb agreement", question: "The dogs ___ running.", options: ["are", "is", "am", "was"], answer: "are" },
            { skill: "JJ. Verb tense", question: "Which sentence happened in the PAST?", options: ["I jumped.", "I jump.", "I will jump.", "I am jumping."], answer: "I jumped." },
            { skill: "KK. Articles", question: "I saw ___ elephant at the zoo.", options: ["an", "a", "the", "two"], answer: "an" },
            { skill: "LL. Adjectives", question: "Which word describes how something looks?", options: ["Shiny", "Run", "Quickly", "Very"], answer: "Shiny" },
            { skill: "MM. Prepositions", question: "The cat is hiding ___ the table.", options: ["under", "jump", "happy", "red"], answer: "under" },
            { skill: "NN. Linking words", question: "Which word connects two ideas?", options: ["And", "Dog", "Run", "Happy"], answer: "And" },
            { skill: "OO. Contractions", question: "What is the contraction for 'do not'?", options: ["don't", "doesnt", "do'nt", "dont'"], answer: "don't" },
            { skill: "PP. Capitalisation", question: "Which name is written correctly with a capital letter?", options: ["Sam", "sam", "sAm", "saM"], answer: "Sam" }
        ];

        // YEAR 4 QUESTIONS (Jace)
        const year4Questions = [
            { skill: "A. Short and long vowels", question: "Which word has a LONG 'a' sound?", options: ["Cat", "Cake", "Apple", "Map"], answer: "Cake" },
            { skill: "B. Blends", question: "Which word starts with a three-letter blend?", options: ["Straw", "Tree", "Ship", "Play"], answer: "Straw" },
            { skill: "C. Multisyllabic words", question: "Which word has an 'open' syllable at the end?", options: ["Tiger", "Cat", "Dog", "Pen"], answer: "Tiger" },
            { skill: "D. Diphthongs and r vowels", question: "Which word contains an 'ou' diphthong?", options: ["Cloud", "Could", "Boat", "Cut"], answer: "Cloud" },
            { skill: "E. Irregular words", question: "Which is the correct spelling of this common sight word?", options: ["Because", "Becuz", "Becuase", "Bekause"], answer: "Because" },
            { skill: "F. Main idea", question: "Read: 'Apples, bananas, and kiwifruit are healthy snacks.' What is the main idea?", options: ["Fruit is healthy", "Apples are red", "Monkeys eat bananas", "Snacks are bad"], answer: "Fruit is healthy" },
            { skill: "G. Theme", question: "In a fable where a tiny mouse saves a giant lion, what is the theme?", options: ["Even small friends can be a big help", "Mice like cheese", "Lions are loud", "Do not sleep in the forest"], answer: "Even small friends can be a big help" },
            { skill: "H. Author's purpose", question: "Why would an author write a recipe for Anzac biscuits?", options: ["To explain how to make them", "To make you laugh", "To tell a scary story", "To sing a song"], answer: "To explain how to make them" },
            { skill: "I. Text structure", question: "Which word shows 'cause and effect'?", options: ["Therefore", "Also", "Next", "Before"], answer: "Therefore" },
            { skill: "J. Sensory details", question: "Which phrase appeals to your sense of HEARING?", options: ["The loud, crashing thunder", "The bright red apple", "The soft, fluffy blanket", "The sweet, sticky honey"], answer: "The loud, crashing thunder" },
            { skill: "K. Literary devices", question: "What does this simile mean: 'As brave as a lion'?", options: ["Very courageous", "Very hungry", "Very yellow", "Very sleepy"], answer: "Very courageous" },
            { skill: "L. Point of view", question: "Which pronoun shows a story is told in the 'First Person'?", options: ["I", "He", "She", "They"], answer: "I" },
            { skill: "M. Inference", question: "If a character is shivering and putting on a thick jacket, what can you infer?", options: ["It is cold", "They are tired", "It is raining", "They are going swimming"], answer: "It is cold" },
            { skill: "N. Story elements", question: "Where and when a story takes place is called the...", options: ["Setting", "Plot", "Characters", "Problem"], answer: "Setting" },
            { skill: "O. Visual elements", question: "What can an illustration tell you about a story?", options: ["What the characters look like", "How the book smells", "The author's age", "How many pages are left"], answer: "What the characters look like" },
            { skill: "P. Literary texts: level 1", question: "Which of these belongs in a Fantasy story?", options: ["A talking dragon", "A history lesson", "A science experiment", "A recipe for cake"], answer: "A talking dragon" },
            { skill: "Q. Literary texts: level 2", question: "Which feature is most common in Poetry?", options: ["Rhyming words", "A table of contents", "An index", "Long paragraphs"], answer: "Rhyming words" },
            { skill: "R. Informational texts: level 1", question: "A text titled 'How Kiwi Birds Live' is an example of...", options: ["Informational text", "A fairy tale", "A poem", "A fable"], answer: "Informational text" },
            { skill: "S. Informational texts: level 2", question: "If you read a book about the Sky Tower in Auckland, you are reading about a...", options: ["Famous place", "Mythical creature", "Science experiment", "Recipe"], answer: "Famous place" },
            { skill: "T. Organising writing", question: "Which sentence should come FIRST in a paragraph?", options: ["First, pour the milk.", "Finally, eat the cereal.", "Next, add the cereal.", "Then, get a spoon."], answer: "First, pour the milk." },
            { skill: "U. Topic sentences", question: "Which is the best topic sentence for a paragraph about dogs?", options: ["Dogs make wonderful pets.", "My dog's name is Buster.", "Dogs have fur.", "I like cats too."], answer: "Dogs make wonderful pets." },
            { skill: "V. Writer's purpose", question: "If a writer wants to convince you to wear a bike helmet, their purpose is to...", options: ["Persuade", "Entertain", "Confuse", "Frighten"], answer: "Persuade" },
            { skill: "W. Linking words", question: "Which word is a time-order linking word?", options: ["Next", "Because", "But", "Or"], answer: "Next" },
            { skill: "X. Opinion writing", question: "Which sentence is an OPINION?", options: ["Skateboarding is the best sport!", "A skateboard has wheels.", "You can wear a helmet.", "Skateboards roll on the ground."], answer: "Skateboarding is the best sport!" },
            { skill: "Y. Descriptive details", question: "Which sentence uses the strongest, most descriptive verb?", options: ["The cheetah sprinted.", "The cheetah went.", "The cheetah moved.", "The cheetah was fast."], answer: "The cheetah sprinted." },
            { skill: "Z. Prefixes and suffixes", question: "What does the suffix '-less' mean in the word 'fearless'?", options: ["Without", "Full of", "Again", "Before"], answer: "Without" },
            { skill: "AA. Greek and Latin roots", question: "The root 'aqua' means water. What is an aquarium?", options: ["A tank for fish", "A fire engine", "A type of bird", "A space ship"], answer: "A tank for fish" },
            { skill: "BB. Compound words", question: "Which of these is a compound word?", options: ["Sunflower", "Beautiful", "Elephant", "Running"], answer: "Sunflower" },
            { skill: "CC. Categories", question: "Which word does NOT belong in this group: Apple, Banana, Carrot, Orange?", options: ["Carrot", "Apple", "Banana", "Orange"], answer: "Carrot" },
            { skill: "DD. Synonyms and antonyms", question: "What is an antonym (opposite) of 'huge'?", options: ["Tiny", "Enormous", "Big", "Giant"], answer: "Tiny" },
            { skill: "EE. Homophones", question: "Choose the correct homophone: I ___ a letter to my friend.", options: ["sent", "cent", "scent", "sents"], answer: "sent" },
            { skill: "FF. Multiple-meaning words", question: "Which sentence uses 'bat' as a flying animal?", options: ["The bat flew out of the cave.", "He hit the ball with the bat.", "It's your turn to bat.", "My cricket bat is heavy."], answer: "The bat flew out of the cave." },
            { skill: "GG. Shades of meaning", question: "Which word means 'VERY angry'?", options: ["Furious", "Annoyed", "Upset", "Grumpy"], answer: "Furious" },
            { skill: "HH. Idioms", question: "What does the idiom 'raining cats and dogs' mean?", options: ["Raining heavily", "Animals are falling", "It is sunny", "It is snowing"], answer: "Raining heavily" },
            { skill: "II. Context clues", question: "The 'massive' elephant blocked the road. What does 'massive' mean?", options: ["Very big", "Tiny", "Green", "Fast"], answer: "Very big" },
            { skill: "JJ. Reference skills", question: "Which word comes FIRST in alphabetical order?", options: ["Kangaroo", "Koala", "Kiwi", "Kookaburra"], answer: "Kangaroo" },
            { skill: "KK. Sentences, fragments & run-ons", question: "Which one is a complete sentence?", options: ["The cat slept.", "Running fast.", "In the house.", "The big green apple."], answer: "The cat slept." },
            { skill: "LL. Nouns", question: "Which word is a proper noun (needs a capital letter)?", options: ["Auckland", "city", "school", "beach"], answer: "Auckland" },
            { skill: "MM. Pronouns", question: "Replace the noun with a pronoun: 'Sarah' went to the shop.", options: ["She", "He", "They", "We"], answer: "She" },
            { skill: "NN. Verb types", question: "Identify the action verb: 'The boy jumped on the trampoline.'", options: ["jumped", "boy", "the", "trampoline"], answer: "jumped" },
            { skill: "OO. Subject-verb agreement", question: "Choose the correct verb: 'The dogs ___ barking.'", options: ["are", "is", "was", "am"], answer: "are" },
            { skill: "PP. Verb tense", question: "Which sentence is in the past tense?", options: ["I walked to school.", "I walk to school.", "I will walk to school.", "I am walking."], answer: "I walked to school." },
            { skill: "QQ. Articles", question: "Choose the correct article: I saw ___ elephant at the zoo.", options: ["an", "a", "the", "two"], answer: "an" },
            { skill: "RR. Adjectives and adverbs", question: "Which word is an adjective? 'The shiny car drove quickly.'", options: ["shiny", "car", "drove", "quickly"], answer: "shiny" },
            { skill: "SS. Prepositions", question: "Identify the preposition: 'The book is ON the table.'", options: ["on", "book", "is", "table"], answer: "on" },
            { skill: "TT. Conjunctions", question: "Which word is a coordinating conjunction?", options: ["But", "Because", "Although", "Unless"], answer: "But" },
            { skill: "UU. Contractions", question: "What is the contraction for 'do not'?", options: ["don't", "doesnt", "do'nt", "dont'"], answer: "don't" },
            { skill: "VV. Commas", question: "Where does the comma go? 'Yes I would like some kiwi fruit.'", options: ["Yes, I would...", "Yes I, would...", "Yes I would, like...", "Yes I would like, some..."], answer: "Yes, I would..." },
            { skill: "WW. Capitalisation", question: "Which of these is capitalised correctly?", options: ["Mount Cook", "mount cook", "Mount cook", "mount Cook"], answer: "Mount Cook" },
            { skill: "XX. Formatting", question: "Which is the correct way to format a book title?", options: ["The Hobbit", "the hobbit", "The hobbit", "the Hobbit"], answer: "The Hobbit" }
        ];

        // GAME LOGIC VARIABLES
        let currentCharacter = 'clariza'; // Default
        let currentQuestionList = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswering = false;

        const setupMenu = document.getElementById("setup-menu");
        const gamePlayArea = document.getElementById("game-play-area");
        const questionBox = document.getElementById("question-box");
        const optionsBox = document.getElementById("options");
        const feedbackBox = document.getElementById("feedback");
        const scoreBox = document.getElementById("score");
        const restartBtn = document.getElementById("restart-btn");
        const skillTag = document.getElementById("skill-tag");
        const questionCounter = document.getElementById("question-counter");
        const progressBar = document.getElementById("progress-bar");
        const gameTitle = document.getElementById("game-title");

        // Set character theme on load
        selectCharacter('clariza');

        function selectCharacter(char) {
            currentCharacter = char;
            
            // UI Highlight
            document.getElementById('card-clariza').classList.remove('selected-clariza');
            document.getElementById('card-jace').classList.remove('selected-jace');
            
            if(char === 'clariza') {
                document.getElementById('card-clariza').classList.add('selected-clariza');
                document.body.className = 'clariza-theme';
                gameTitle.innerText = "🦄 Clariza's English Adventure! 🧁";
            } else {
                document.getElementById('card-jace').classList.add('selected-jace');
                document.body.className = 'jace-theme';
                gameTitle.innerText = "🦖 Jace's English Adventure! 🪐";
            }
        }

        function shuffle(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initializeGame() {
            // Stop any playing audio
            if('speechSynthesis' in window) window.speechSynthesis.cancel();

            const lengthSelection = document.getElementById("length-select").value;
            let database = (currentCharacter === 'clariza') ? year2Questions : year4Questions;

            // Randomize and slice
            let randomizedDB = shuffle(database);
            if (lengthSelection === "all") {
                currentQuestionList = randomizedDB;
            } else {
                currentQuestionList = randomizedDB.slice(0, parseInt(lengthSelection));
            }

            // Reset scores
            currentQuestionIndex = 0;
            score = 0;
            scoreBox.innerText = score;

            // Swap UI
            setupMenu.style.display = "none";
            restartBtn.style.display = "none";
            gamePlayArea.style.display = "block";
            skillTag.style.display = "inline-block";
            
            showQuestion();
        }

        function showQuestion() {
            isAnswering = false;
            feedbackBox.innerText = "";
            if('speechSynthesis' in window) window.speechSynthesis.cancel(); // Stop talking when advancing
            
            // End of game
            if (currentQuestionIndex >= currentQuestionList.length) {
                questionBox.innerHTML = `🎉 Amazing! You finished your adventure with a score of ${score}! 🎉`;
                optionsBox.innerHTML = "";
                skillTag.style.display = "none";
                document.getElementById('audio-btn').style.display = "none";
                questionCounter.innerText = "Complete!";
                progressBar.style.width = "100%";
                restartBtn.style.display = "inline-block";
                return;
            }

            const currentQuestion = currentQuestionList[currentQuestionIndex];
            
            // Update Progress Bar
            document.getElementById('audio-btn').style.display = "inline-block";
            questionCounter.innerText = `Question: ${currentQuestionIndex + 1} / ${currentQuestionList.length}`;
            let progressPercentage = (currentQuestionIndex / currentQuestionList.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;
            
            // Render Text
            skillTag.innerText = "Category: " + currentQuestion.skill;
            questionBox.innerText = currentQuestion.question;
            optionsBox.innerHTML = "";
            
            // Render Answer Buttons
            let shuffledOptions = shuffle(currentQuestion.options);
            shuffledOptions.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.classList.add("btn");
                button.onclick = () => selectAnswer(option, currentQuestion.answer, button);
                optionsBox.appendChild(button);
            });
        }

        function playQuestionAudio() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Reset
                const text = questionBox.innerText;
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Kid-friendly speech settings (slightly slower)
                utterance.rate = 0.9; 
                utterance.pitch = 1.1; 
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Sorry, your browser does not support the Read Aloud feature.");
            }
        }

        function selectAnswer(selected, correct, buttonElement) {
            if (isAnswering) return; 
            isAnswering = true;

            const buttons = document.querySelectorAll('.btn');
            
            if (selected === correct) {
                feedbackBox.innerText = "🌟 Correct! Great job!";
                feedbackBox.className = "correct";
                buttonElement.style.backgroundColor = "#2ED573"; 
                buttonElement.style.color = "white";
                buttonElement.style.borderColor = "#219a52";
                score += 10;
                scoreBox.innerText = score;
            } else {
                feedbackBox.innerText = "Oops! The correct answer was: " + correct;
                feedbackBox.className = "wrong";
                buttonElement.style.backgroundColor = "#FF4757"; 
                buttonElement.style.color = "white";
                buttonElement.style.borderColor = "#c0392b";
                
                buttons.forEach(btn => {
                    if(btn.innerText === correct) {
                        btn.style.backgroundColor = "#2ED573";
                        btn.style.color = "white";
                        btn.style.borderColor = "#219a52";
                    }
                });
            }

            // Move to next question automatically
            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
            }, 2000);
        }

        function backToMenu() {
            if('speechSynthesis' in window) window.speechSynthesis.cancel();
            gamePlayArea.style.display = "none";
            restartBtn.style.display = "none";
            setupMenu.style.display = "block";
            // Re-apply the selected character's theme on menu return
            selectCharacter(currentCharacter); 
        }
    </script>
</body>
</html>
